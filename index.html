<!DOCTYPE html>
<html>
<head>
    <title>Gig Worker Insurance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Insurance for Delivery Partners</h1>

<div class="container">

    <h2>Register</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="city" placeholder="City">
    <br>
    <button onclick="register()">Register</button>

    <h2>Weekly Policy</h2>
    <p>Premium: ₹49/week</p>
    <button onclick="buyPolicy()">Buy Policy</button>

    <h2>Trigger Event</h2>
    <button onclick="triggerRain()">Simulate Heavy Rain</button>

    <h2>Status</h2>
    <p id="status">No claims yet</p>

</div>

<!-- IMPORTANT: script at bottom -->
<script src="script.js"></script>

</body>
</html>
