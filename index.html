<!DOCTYPE html>
<html>
<head>
    <title>Gig Worker Insurance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Insurance for Delivery Partners</h1>

<div class="container">
    <h2>Register</h2>
    <input type="text" placeholder="Name">
    <input type="text" placeholder="City">
    <button onclick="register()">Register</button>

    <h2>Weekly Policy</h2>
    <p>Premium: ₹49/week</p>
    <button onclick="buyPolicy()">Buy Policy</button>

    <h2>Trigger Event</h2>
    <button onclick="triggerRain()">Simulate Heavy Rain</button>

    <h2>Status</h2>
    <p id="status">No claims yet</p>
</div>

<script src="script.js"></script>
</body>
</html>
